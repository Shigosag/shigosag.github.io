<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Shigosag | Segun Arulogun Gabriel - Full-Stack Developer Portfolio showcasing GitHub projects, skills, and software solutions." />
<meta name="keywords" content="Shigosag, developer portfolio, full stack developer, React, Node.js, GitHub projects" />
<meta name="author" content="Segun Arulogun Gabriel" />

<!-- OpenGraph -->
<meta property="og:title" content="Shigosag | Developer Portfolio" />
<meta property="og:description" content="Full-Stack Developer Portfolio showcasing GitHub projects." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://shigosag.github.io" />
<meta property="og:image" content="https://via.placeholder.com/1200x630" />

<title>Shigosag | Developer Portfolio</title>

<style>
:root{
  --red:#d80000;
  --bg:#f6f6f6;
  --card:#fff;
  --dark:#111;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:var(--bg);
  color:var(--dark);
  padding:20px;
  transition: background 0.3s, color 0.3s;
}

body.dark {
  background:#121212;
  color:#eee;
}

body.dark .card,
body.dark .stat,
body.dark .project {
  background:#1e1e1e;
  color:#eee;
}

.container{
  max-width:1000px;
  margin:auto;
}

header{
  text-align:center;
  margin-bottom:20px;
  animation: fadeDown 0.8s ease;
}

header img{
  width:80px;
  height:80px;
  border-radius:50%;
  animation: bounce 2s infinite;
}

header h1{
  color:var(--red);
  font-size:2.5em;
  animation: fadeUp 1s ease forwards;
}

.btn{
  position:fixed;
  top:15px;
  right:15px;
  background:var(--red);
  color:#fff;
  border:none;
  padding:8px 12px;
  border-radius:5px;
  cursor:pointer;
  z-index:10;
}

/* STATS */
.stats{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
  margin:20px 0;
  animation: fadeUp 0.6s forwards;
}

.stat{
  background:var(--card);
  padding:10px 15px;
  border-left:4px solid var(--red);
  border-radius:8px;
  transition:0.3s;
}

/* GRID CARDS */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
  margin-top:15px;
}

.card{
  background:var(--card);
  padding:15px;
  border-left:4px solid var(--red);
  border-radius:10px;
  opacity:0;
  transform:translateY(20px);
  animation:fadeUp 0.6s forwards;
}

.card:nth-child(1){ animation-delay:0.1s; }
.card:nth-child(2){ animation-delay:0.2s; }
.card:nth-child(3){ animation-delay:0.3s; }

/* PROJECTS */
.projects{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:15px;
  margin-top:20px;
}

.project{
  background:var(--card);
  border-radius:10px;
  overflow:hidden;
  border-left:4px solid var(--red);
  transition:0.3s;
  opacity:0;
  transform:translateY(20px);
  animation:fadeUp 0.6s forwards;
}

.project img{
  width:100%;
  height:150px;
  object-fit:cover;
}

.project:nth-child(1){ animation-delay:0.1s; }
.project:nth-child(2){ animation-delay:0.2s; }
.project:nth-child(3){ animation-delay:0.3s; }

.content{
  padding:10px;
}

a{
  color:var(--red);
  text-decoration:none;
}

footer{
  text-align:center;
  margin-top:30px;
  color:gray;
}

/* ANIMATIONS */
@keyframes fadeUp{
  to{opacity:1; transform:translateY(0);}
}

@keyframes fadeDown{
  from{opacity:0; transform:translateY(-20px);}
  to{opacity:1; transform:translateY(0);}
}

@keyframes bounce{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
}
</style>
</head>

<body>

<button class="btn" onclick="toggleDark()">🌙</button>

<div class="container">

<header>
  <img src="https://via.placeholder.com/80" alt="Logo" />
  <h1>Shigosag</h1>
  <p>Segun Arulogun Gabriel • Full-Stack Developer</p>
</header>

<!-- STATS -->
<div class="stats">
  <div class="stat" id="repos">📦 Repos</div>
  <div class="stat" id="followers">👥 Followers</div>
</div>

<!-- ABOUT / SKILLS / LINKS -->
<div class="grid">
  <div class="card">
    <h2>👋 About</h2>
    <p>Full-stack developer building scalable systems and modern apps.</p>
  </div>

  <div class="card">
    <h2>💻 Skills</h2>
    <p>React, Node.js, Express, PostgreSQL, MongoDB, Python, FastAPI</p>
  </div>

  <div class="card">
    <h2>🌐 Links</h2>
    <p>
      <a href="https://github.com/Shigosag">GitHub</a> •
      <a href="#">LinkedIn</a> •
      <a href="#">Medium</a>
    </p>
  </div>
</div>

<!-- PROJECTS -->
<h2 style="margin-top:25px;">🚀 GitHub Projects</h2>
<div class="projects" id="projects"></div>

<footer>
© 2026 Shigosag
</footer>

</div>

<script>
const user = "Shigosag";

/* DARK MODE */
function toggleDark(){
  document.body.classList.toggle("dark");
}

/* GITHUB STATS */
fetch(`https://api.github.com/users/${user}`)
.then(r=>r.json())
.then(d=>{
  document.getElementById("repos").innerText = "📦 Repos: " + d.public_repos;
  document.getElementById("followers").innerText = "👥 Followers: " + d.followers;
});

/* PROJECTS */
fetch(`https://api.github.com/users/${user}/repos`)
.then(r=>r.json())
.then(data=>{
  const box=document.getElementById("projects");
  data.slice(0,6).forEach((repo,i)=>{
    const div=document.createElement("div");
    div.className="project";
    div.style.animationDelay = (0.1*(i+1)) + "s";
    const img=`https://opengraph.githubassets.com/1/${user}/${repo.name}`;
    div.innerHTML=`
      <img src="${img}" />
      <div class="content">
        <h3><a href="${repo.html_url}" target="_blank">${repo.name}</a></h3>
        <p>${repo.description || "No description"}</p>
        ⭐ ${repo.stargazers_count} | 🍴 ${repo.forks_count}
      </div>
    `;
    box.appendChild(div);
  });
});
</script>

</body>
</html>
